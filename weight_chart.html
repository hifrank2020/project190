<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weight Progress — Jul 1 to Oct 1</title>
<style>
  :root{
    --ink:#1c2331;
    --paper:#fbfaf7;
    --panel:#ffffff;
    --line:#e4e1d8;
    --blue:#2f5fb3;
    --blue-soft:#eef3fc;
    --black:#1c2331;
    --muted:#8a8d92;
    --green:#2f8f5b;
    --red:#c0533e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    padding:32px 16px 60px 16px;
  }
  .wrap{max-width:960px;margin:0 auto;}
  .head{margin-bottom:18px;}
  .eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin:0 0 6px 0;
  }
  h1{font-size:26px;margin:0 0 4px 0;font-weight:700;letter-spacing:-0.01em;}
  h2{font-size:16px;margin:0;font-weight:700;}
  .sub{font-size:14px;color:var(--muted);margin:0;}
  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:20px 24px 12px 8px;margin-top:20px;
  }
  .legend{display:flex;gap:22px;flex-wrap:wrap;padding:0 16px 14px 16px;font-size:13px;}
  .legend-item{display:flex;align-items:center;gap:7px;}
  .swatch{width:20px;height:0;border-top-width:2.5px;border-top-style:solid;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block;}
  .stats{display:flex;gap:28px;flex-wrap:wrap;padding:16px 16px 4px 16px;border-top:1px solid var(--line);margin-top:8px;}
  .stat .n{font-size:20px;font-weight:700;}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:2px;}
  .note{font-size:12px;color:var(--muted);padding:14px 16px 0 16px;line-height:1.5;}
  code{background:#f0efe9;padding:1px 5px;border-radius:4px;font-size:11.5px;}
  .banner{
    margin:10px 16px 0 16px;padding:12px 14px;border-radius:8px;
    font-size:13px;line-height:1.5;
  }
  .banner.warn{background:#fdf3e4;border:1px solid #f0dcb0;color:#8a5a12;}
  .banner.error{background:#fbeceb;border:1px solid #f0c4c0;color:#a3382b;}

  /* Log panel */
  .log-panel{margin-top:22px;padding:8px 8px 16px 8px;}
  .log-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 14px 16px;flex-wrap:wrap;gap:10px;}
  .log-actions{display:flex;gap:8px;}
  .btn{
    font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:7px;
    border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;
  }
  .btn:hover{background:#f5f4ef;}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn.primary:hover{background:#33405a;}

  details.week{
    border-top:1px solid var(--line);
  }
  details.week:first-of-type{border-top:none;}
  details.week summary{
    list-style:none;cursor:pointer;padding:12px 16px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:13.5px;font-weight:600;
  }
  details.week summary::-webkit-details-marker{display:none;}
  .summary-left{display:flex;align-items:center;gap:10px;}
  .chev{
    display:inline-block;width:9px;height:9px;border-right:2px solid var(--muted);
    border-bottom:2px solid var(--muted);transform:rotate(-45deg);transition:transform .15s;
  }
  details.week[open] summary .chev{transform:rotate(45deg);}
  .week-meta{font-weight:400;color:var(--muted);font-size:12.5px;}
  .week-badge{
    font-size:11px;font-weight:700;background:var(--blue-soft);color:var(--blue);
    padding:2px 8px;border-radius:999px;
  }

  table.days{width:100%;border-collapse:collapse;padding:0 16px;}
  table.days td{padding:6px 16px;font-size:13.5px;border-top:1px solid #f0efe9;}
  table.days tr:first-child td{border-top:none;}
  .col-date{width:110px;color:var(--ink);font-weight:600;}
  .col-day{width:60px;color:var(--muted);font-size:12px;}
  .col-input{width:130px;}
  .col-change{width:110px;text-align:right;font-variant-numeric:tabular-nums;}
  .col-tag{color:var(--muted);font-size:11.5px;}
  input.weight-input{
    width:88px;font-size:13.5px;padding:5px 8px;border:1px solid var(--line);
    border-radius:6px;font-family:inherit;color:var(--ink);
  }
  input.weight-input:focus{outline:2px solid var(--blue-soft);border-color:var(--blue);}
  .today-row td{background:#fbf6ea;}
  .change-up{color:var(--red);}
  .change-down{color:var(--green);}
  svg text{font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <p class="eyebrow">Jul 1 — Oct 1, 2026</p>
    <h1>Weight Progress</h1>
    <p class="sub">Daily gridlines on Mondays · target pace vs. actual weigh-ins</p>
  </div>

  <div class="panel">
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="border-top-color:var(--black);border-top-style:dashed;"></span>Target pace</div>
      <div class="legend-item"><span class="dot"></span><span class="swatch" style="border-top-color:var(--blue);"></span>Weigh-ins</div>
      <div class="legend-item"><span class="swatch" style="border-top-color:var(--blue);border-top-style:dashed;"></span>Trend (linear fit)</div>
    </div>
    <div id="chart"></div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="panel log-panel">
    <div id="setupBanner"></div>
    <div class="log-head">
      <h2>Weigh-in Log</h2>
      <div class="log-actions">
        <button class="btn" id="expandAllBtn">Expand all</button>
        <button class="btn" id="collapseAllBtn">Collapse all</button>
        <button class="btn primary" id="saveBtn">Save log</button>
      </div>
    </div>
    <div id="weekList"></div>
    <p class="note" id="statusNote">Type a weight into any field, then click <strong>Save log</strong> to write it to your Google Sheet.</p>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// GOOGLE SHEET CONFIG
// Paste the Web App URL you get from deploying the companion Apps
// Script (see apps_script.gs) between the quotes below. Until you
// do, the chart runs on the seed data only and Save is disabled.
// ---------------------------------------------------------------
const SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

// ---------------------------------------------------------------
// SEED DATA — used on first load / as a fallback if the Sheet
// can't be reached. Once Save works, the Sheet is the source of
// truth and this array is only a backup.
// ---------------------------------------------------------------
const weighIns = [
  { date: '2026-07-13', weight: 208.8 },
  { date: '2026-07-14', weight: 205.6 },
  { date: '2026-07-15', weight: 206.0 },
  { date: '2026-07-16', weight: 206.6 },
  { date: '2026-07-17', weight: 205.8 },
  { date: '2026-07-18', weight: null }, // no weigh-in
  { date: '2026-07-19', weight: 205.0 },
  { date: '2026-07-20', weight: 204.6 },
];

const START_DATE = '2026-07-01';
const END_DATE   = '2026-10-01';
const START_WEIGHT = 208.8;   // anchor for the target line
const START_WEIGHT_DATE = '2026-07-13';
const TARGET_WEIGHT = 190;
const TARGET_DATE = '2026-10-01';
const TODAY = '2026-07-20';

// ---------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------
function toDate(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function toStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dayIndex(s){ return Math.round((toDate(s) - toDate(START_DATE)) / 86400000); }
function fmt(s){ const d = toDate(s); return (d.getMonth()+1) + '/' + d.getDate(); }
function dayName(s){ return toDate(s).toLocaleDateString('en-US',{ weekday:'short' }); }
function mondayOf(s){ const d = toDate(s); const off = (d.getDay()+6)%7; d.setDate(d.getDate()-off); return toStr(d); }

const totalDays = dayIndex(END_DATE);
const allDays = [];
for(let i=0;i<=totalDays;i++){
  const d = new Date(toDate(START_DATE).getTime() + i*86400000);
  allDays.push({ index:i, dateStr: toStr(d), date:d, isMonday: d.getDay() === 1 });
}

// dataMap: date string -> weight or null, seeded from weighIns
const dataMap = {};
allDays.forEach(d => dataMap[d.dateStr] = null);
weighIns.forEach(w => { if(w.date in dataMap) dataMap[w.date] = w.weight; });

// ---------------------------------------------------------------
// Layout constants
// ---------------------------------------------------------------
const W = 900, H = 460;
const M = { top: 24, right: 26, bottom: 46, left: 52 };
const plotW = W - M.left - M.right;
const plotH = H - M.top - M.bottom;

// ===================================================================
// CHART RENDER
// ===================================================================
function renderChart(){
  const currentSeries = allDays.map(d => ({ date: d.dateStr, weight: dataMap[d.dateStr] }));
  const validWeights = currentSeries.filter(w => w.weight != null).map(w => w.weight);

  const yMax = Math.ceil(Math.max(START_WEIGHT, ...(validWeights.length?validWeights:[START_WEIGHT])) + 1.5);
  const yMin = Math.floor(Math.min(TARGET_WEIGHT, ...(validWeights.length?validWeights:[TARGET_WEIGHT])) - 1.5);

  function xPos(dateStr){ return M.left + (dayIndex(dateStr)/totalDays) * plotW; }
  function yPos(weight){ return M.top + (1 - (weight - yMin)/(yMax - yMin)) * plotH; }

  // linear regression trend over logged points
  const pts = currentSeries.filter(w => w.weight != null).map(w => ({ x: dayIndex(w.date), y: w.weight }));
  let trendPath = '';
  let slopePerWeek = null;
  if(pts.length >= 2){
    const n = pts.length;
    const sumX = pts.reduce((a,p)=>a+p.x,0);
    const sumY = pts.reduce((a,p)=>a+p.y,0);
    const sumXY = pts.reduce((a,p)=>a+p.x*p.y,0);
    const sumXX = pts.reduce((a,p)=>a+p.x*p.x,0);
    const denom = (n*sumXX - sumX*sumX);
    const slope = denom !== 0 ? (n*sumXY - sumX*sumY) / denom : 0;
    const intercept = (sumY - slope*sumX) / n;
    const x1 = pts[0].x, x2 = totalDays;
    const y1 = slope*x1 + intercept, y2 = slope*x2 + intercept;
    const p1x = M.left + (x1/totalDays)*plotW, p1y = yPos(y1);
    const p2x = M.left + (x2/totalDays)*plotW, p2y = yPos(y2);
    trendPath = `M ${p1x} ${p1y} L ${p2x} ${p2y}`;
    slopePerWeek = (slope*7).toFixed(2);
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible;font-size:11px;">`;

  for(let w = Math.ceil(yMin/2)*2; w <= yMax; w += 2){
    const y = yPos(w);
    svg += `<line x1="${M.left}" y1="${y}" x2="${W-M.right}" y2="${y}" stroke="#eeece4" stroke-width="1"/>`;
    svg += `<text x="${M.left-10}" y="${y+3.5}" text-anchor="end" fill="#8a8d92">${w}</text>`;
  }

  allDays.forEach(d => {
    const x = M.left + (d.index/totalDays)*plotW;
    if(d.isMonday){
      svg += `<line x1="${x}" y1="${M.top}" x2="${x}" y2="${M.top+plotH}" stroke="#d7dae2" stroke-width="1"/>`;
    }
    const tickLen = d.isMonday ? 7 : 4;
    svg += `<line x1="${x}" y1="${M.top+plotH}" x2="${x}" y2="${M.top+plotH+tickLen}" stroke="#c7c4b8" stroke-width="1"/>`;
  });

  ['2026-07-01','2026-08-01','2026-09-01','2026-10-01'].forEach(m => {
    const x = xPos(m);
    const label = toDate(m).toLocaleString('en-US', { month:'short' });
    svg += `<text x="${x}" y="${M.top+plotH+34}" text-anchor="middle" fill="#5a5d63" font-weight="600">${label}</text>`;
  });

  svg += `<line x1="${M.left}" y1="${M.top+plotH}" x2="${W-M.right}" y2="${M.top+plotH}" stroke="#c7c4b8" stroke-width="1"/>`;

  {
    const x1 = xPos(START_WEIGHT_DATE), y1 = yPos(START_WEIGHT);
    const x2 = xPos(TARGET_DATE), y2 = yPos(TARGET_WEIGHT);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#1c2331" stroke-width="2" stroke-dasharray="6 5"/>`;
    svg += `<circle cx="${x2}" cy="${y2}" r="4" fill="#1c2331"/>`;
    svg += `<text x="${x2-8}" y="${y2-10}" text-anchor="end" fill="#1c2331" font-weight="600">Target: ${TARGET_WEIGHT} lb</text>`;
  }

  if(trendPath){
    svg += `<path d="${trendPath}" fill="none" stroke="#2f5fb3" stroke-width="2" stroke-dasharray="5 5" opacity="0.75"/>`;
  }

  {
    let path = '';
    let drawing = false;
    currentSeries.forEach(w => {
      if(w.weight == null){ drawing = false; return; }
      const x = xPos(w.date), y = yPos(w.weight);
      path += (drawing ? ' L ' : 'M ') + x + ' ' + y;
      drawing = true;
    });
    svg += `<path d="${path}" fill="none" stroke="#2f5fb3" stroke-width="2.5"/>`;
    currentSeries.forEach(w => {
      if(w.weight == null) return;
      const x = xPos(w.date), y = yPos(w.weight);
      svg += `<circle cx="${x}" cy="${y}" r="4.5" fill="#2f5fb3" stroke="#fff" stroke-width="1.5"><title>${fmt(w.date)}: ${w.weight} lb</title></circle>`;
    });
  }

  svg += `</svg>`;
  document.getElementById('chart').innerHTML = svg;

  // stats
  const logged = currentSeries.filter(w => w.weight != null);
  const latest = logged[logged.length - 1];
  const statsEl = document.getElementById('stats');
  if(latest){
    const totalLostRaw = +(START_WEIGHT - latest.weight).toFixed(1);
    const toGo = (latest.weight - TARGET_WEIGHT).toFixed(1);
    statsEl.innerHTML = `
      <div class="stat"><div class="n">${latest.weight} lb</div><div class="l">Latest (${fmt(latest.date)})</div></div>
      <div class="stat"><div class="n">${totalLostRaw >= 0 ? '-' : '+'}${Math.abs(totalLostRaw)} lb</div><div class="l">Lost so far</div></div>
      <div class="stat"><div class="n">${toGo} lb</div><div class="l">To go</div></div>
      <div class="stat"><div class="n">${slopePerWeek !== null ? slopePerWeek+' lb' : '—'}</div><div class="l">Trend / week</div></div>
    `;
  } else {
    statsEl.innerHTML = `<div class="stat"><div class="l">No weigh-ins logged yet</div></div>`;
  }
}

// ===================================================================
// LOG RENDER (collapsible by week, one input per day)
// ===================================================================
function buildWeeks(){
  const weeks = {};
  allDays.forEach(d => {
    const key = mondayOf(d.dateStr);
    if(!weeks[key]) weeks[key] = [];
    weeks[key].push(d);
  });
  return Object.keys(weeks).sort().map(key => ({ weekStart: key, days: weeks[key] }));
}
const weeks = buildWeeks();

function previousLoggedWeight(dateStr){
  const idx = dayIndex(dateStr);
  for(let i = idx - 1; i >= 0; i--){
    const d = allDays[i];
    if(dataMap[d.dateStr] != null) return dataMap[d.dateStr];
  }
  return null;
}

function renderLog(){
  const container = document.getElementById('weekList');
  container.innerHTML = '';

  weeks.forEach((week) => {
    const loggedCount = week.days.filter(d => dataMap[d.dateStr] != null).length;
    const containsToday = week.days.some(d => d.dateStr === TODAY);

    const details = document.createElement('details');
    details.className = 'week';
    if(loggedCount > 0 || containsToday) details.open = true;

    const summary = document.createElement('summary');
    const rangeLabel = week.days.length > 1
      ? `${fmt(week.days[0].dateStr)} – ${fmt(week.days[week.days.length-1].dateStr)}`
      : fmt(week.days[0].dateStr);
    summary.innerHTML = `
      <span class="summary-left">
        <span class="chev"></span>
        <span>Week of ${fmt(week.weekStart)}</span>
        <span class="week-meta">${rangeLabel}</span>
      </span>
      <span class="week-badge">${loggedCount}/${week.days.length} logged</span>
    `;
    details.appendChild(summary);

    const table = document.createElement('table');
    table.className = 'days';
    week.days.forEach(d => {
      const tr = document.createElement('tr');
      if(d.dateStr === TODAY) tr.className = 'today-row';

      const w = dataMap[d.dateStr];
      const prev = previousLoggedWeight(d.dateStr);
      let changeHTML = '<span class="col-tag">—</span>';
      if(d.dateStr === START_WEIGHT_DATE && w != null){
        changeHTML = '<span class="col-tag">Starting weight</span>';
      } else if(w != null && prev != null){
        const diff = +(w - prev).toFixed(1);
        const cls = diff > 0 ? 'change-up' : diff < 0 ? 'change-down' : '';
        const sign = diff > 0 ? '+' : '';
        changeHTML = `<span class="${cls}">${sign}${diff} lb</span>`;
      } else if(w == null){
        changeHTML = '<span class="col-tag">No weigh-in</span>';
      }

      tr.innerHTML = `
        <td class="col-date">${fmt(d.dateStr)}</td>
        <td class="col-day">${dayName(d.dateStr)}</td>
        <td class="col-input">
          <input type="number" step="0.1" class="weight-input" data-date="${d.dateStr}"
            value="${w != null ? w : ''}" placeholder="–" />
        </td>
        <td class="col-change">${changeHTML}</td>
      `;
      table.appendChild(tr);
    });
    details.appendChild(table);
    container.appendChild(details);
  });

  container.querySelectorAll('.weight-input').forEach(inp => {
    inp.addEventListener('change', (e) => {
      const date = e.target.dataset.date;
      const val = e.target.value.trim();
      dataMap[date] = val === '' ? null : parseFloat(val);
      renderAll();
    });
  });
}

function renderAll(){
  renderChart();
  renderLog();
}

function isConfigured(){
  return typeof SCRIPT_URL === 'string' && SCRIPT_URL.length > 0 && !SCRIPT_URL.includes('PASTE_YOUR');
}

function showBanner(message, type){
  const el = document.getElementById('setupBanner');
  if(!message){ el.innerHTML = ''; return; }
  el.innerHTML = `<div class="banner ${type || 'warn'}">${message}</div>`;
}

async function loadSavedData(){
  if(!isConfigured()){
    showBanner('Not connected to a Google Sheet yet — showing seed data only. Add your Apps Script Web App URL to <code>SCRIPT_URL</code> in this file to enable saving and loading. See the setup steps that came with this file.', 'warn');
    return;
  }
  try{
    const res = await fetch(SCRIPT_URL);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const saved = await res.json();
    Object.keys(saved).forEach(date => {
      if(date in dataMap) dataMap[date] = saved[date];
    });
    showBanner('');
  } catch(e){
    console.error('Load error:', e);
    showBanner('Could not load data from the Google Sheet (' + e.message + '). Showing seed data — check that the Web App is deployed with "Anyone" access and the URL is correct.', 'error');
  }
}

async function init(){
  await loadSavedData();
  renderAll();
}
init();

// ---------------------------------------------------------------
// Controls
// ---------------------------------------------------------------
document.getElementById('expandAllBtn').addEventListener('click', () => {
  document.querySelectorAll('details.week').forEach(d => d.open = true);
});
document.getElementById('collapseAllBtn').addEventListener('click', () => {
  document.querySelectorAll('details.week').forEach(d => d.open = false);
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveBtn');
  const original = btn.textContent;

  if(!isConfigured()){
    showBanner('Add your Apps Script Web App URL to <code>SCRIPT_URL</code> in this file before saving.', 'warn');
    return;
  }

  btn.textContent = 'Saving…';
  btn.disabled = true;
  try{
    const toSave = {};
    allDays.forEach(d => { if(dataMap[d.dateStr] != null) toSave[d.dateStr] = dataMap[d.dateStr]; });
    // Sent as text/plain to avoid a CORS preflight that Apps Script web apps don't handle.
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(toSave)
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    btn.textContent = 'Saved ✓';
    showBanner('');
  } catch(e){
    console.error('Save error:', e);
    btn.textContent = 'Save failed';
    showBanner('Save failed (' + e.message + '). Check the Apps Script deployment and SCRIPT_URL.', 'error');
  } finally {
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1500);
  }
});
</script>
</body>
</html>
